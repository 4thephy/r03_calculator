<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 뉴로 계산기 - Smart Neuro Calculator</title>
  <!-- Google Fonts: Outfit & Fira Code for numbers -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons (via CDN for clean iconography) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
  <div class="glow-bg"></div>
  
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <i data-lucide="cpu" class="logo-icon"></i>
        <h1>Smart <span>Neuro</span></h1>
      </div>
      
      <!-- Mode Tabs -->
      <nav class="mode-tabs">
        <button class="tab-btn active" data-mode="standard">
          <i data-lucide="calculator"></i>
          <span>일반</span>
        </button>
        <button class="tab-btn" data-mode="scientific">
          <i data-lucide="binary"></i>
          <span>공학용</span>
        </button>
        <button class="tab-btn" data-mode="graphing">
          <i data-lucide="line-chart"></i>
          <span>그래프</span>
        </button>
        <button class="tab-btn" data-mode="converter">
          <i data-lucide="refresh-cw"></i>
          <span>단위 변환</span>
        </button>
      </nav>

      <!-- Utility Controls -->
      <div class="header-actions">
        <button id="theme-toggle-btn" class="util-btn" title="테마 변경">
          <i data-lucide="sun" class="sun-icon"></i>
          <i data-lucide="moon" class="moon-icon"></i>
        </button>
        <button id="history-toggle-btn" class="util-btn" title="계산 기록">
          <i data-lucide="history"></i>
        </button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="main-workspace">
      
      <!-- Calculator Column -->
      <div class="calculator-card">
        <!-- Display Area -->
        <div class="display-panel">
          <div class="input-line-wrapper">
            <span class="expression-prompt">></span>
            <div id="display-input" class="display-input" placeholder="0">0</div>
          </div>
          <div id="display-preview" class="display-preview"></div>
        </div>

        <!-- Workspaces (Switch dynamically based on mode) -->
        <div class="workspace-views">
          
          <!-- Keyboards View (Standard & Scientific share this) -->
          <div id="keyboard-view" class="workspace-view active">
            <!-- Scientific Extra Keys (will be shown/hidden or slide out) -->
            <div id="scientific-pad" class="keyboard-grid scientific-grid hidden">
              <button class="btn btn-sci" data-val="rad-deg" id="toggle-angle">RAD</button>
              <button class="btn btn-sci" data-val="sin">sin</button>
              <button class="btn btn-sci" data-val="cos">cos</button>
              <button class="btn btn-sci" data-val="tan">tan</button>
              <button class="btn btn-sci" data-val="π">π</button>
              
              <button class="btn btn-sci" data-val="^">x<sup>y</sup></button>
              <button class="btn btn-sci" data-val="asin">asin</button>
              <button class="btn btn-sci" data-val="acos">acos</button>
              <button class="btn btn-sci" data-val="atan">atan</button>
              <button class="btn btn-sci" data-val="e">e</button>
              
              <button class="btn btn-sci" data-val="sqrt">√</button>
              <button class="btn btn-sci" data-val="log">log</button>
              <button class="btn btn-sci" data-val="ln">ln</button>
              <button class="btn btn-sci" data-val="!">x!</button>
              <button class="btn btn-sci" data-val="mod">mod</button>
            </div>

            <!-- Standard Keys -->
            <div class="keyboard-grid standard-grid">
              <button class="btn btn-action" data-val="clear" id="btn-clear">AC</button>
              <button class="btn btn-action" data-val="backspace"><i data-lucide="arrow-left"></i></button>
              <button class="btn btn-action" data-val="()">( )</button>
              <button class="btn btn-operator" data-val="/">÷</button>
              
              <button class="btn btn-num" data-val="7">7</button>
              <button class="btn btn-num" data-val="8">8</button>
              <button class="btn btn-num" data-val="9">9</button>
              <button class="btn btn-operator" data-val="*">×</button>
              
              <button class="btn btn-num" data-val="4">4</button>
              <button class="btn btn-num" data-val="5">5</button>
              <button class="btn btn-num" data-val="6">6</button>
              <button class="btn btn-operator" data-val="-">−</button>
              
              <button class="btn btn-num" data-val="1">1</button>
              <button class="btn btn-num" data-val="2">2</button>
              <button class="btn btn-num" data-val="3">3</button>
              <button class="btn btn-operator" data-val="+">+</button>
              
              <button class="btn btn-num" data-val="neg">±</button>
              <button class="btn btn-num" data-val="0">0</button>
              <button class="btn btn-num" data-val=".">.</button>
              <button class="btn btn-equals" data-val="equals" id="btn-equals">=</button>
            </div>
          </div>

          <!-- Graphing View -->
          <div id="graphing-view" class="workspace-view">
            <div class="graphing-controls">
              <div class="function-input-group">
                <div class="function-input-row">
                  <span class="fn-color-indicator fn1"></span>
                  <span class="fn-label">f(x) =</span>
                  <input type="text" id="fn1-input" class="fn-input" placeholder="x^2 - 2" value="x^2 - 2">
                </div>
                <div class="function-input-row">
                  <span class="fn-color-indicator fn2"></span>
                  <span class="fn-label">g(x) =</span>
                  <input type="text" id="fn2-input" class="fn-input" placeholder="sin(x)" value="sin(x)">
                </div>
              </div>
              <div class="graphing-buttons">
                <button class="btn-graph-action" id="btn-zoom-in" title="확대"><i data-lucide="zoom-in"></i></button>
                <button class="btn-graph-action" id="btn-zoom-out" title="축소"><i data-lucide="zoom-out"></i></button>
                <button class="btn-graph-action" id="btn-zoom-reset" title="초기화"><i data-lucide="maximize-2"></i></button>
              </div>
            </div>
            <div class="canvas-container">
              <canvas id="graph-canvas"></canvas>
              <div id="graph-tooltip" class="graph-tooltip"></div>
            </div>
          </div>

          <!-- Unit Converter View -->
          <div id="converter-view" class="workspace-view">
            <!-- Category Tabs -->
            <div class="converter-categories">
              <button class="conv-cat-btn active" data-cat="length">
                <i data-lucide="ruler"></i><span>길이</span>
              </button>
              <button class="conv-cat-btn" data-cat="weight">
                <i data-lucide="scale"></i><span>무게</span>
              </button>
              <button class="conv-cat-btn" data-cat="temperature">
                <i data-lucide="thermometer"></i><span>온도</span>
              </button>
              <button class="conv-cat-btn" data-cat="area">
                <i data-lucide="layout"></i><span>넓이</span>
              </button>
              <button class="conv-cat-btn" data-cat="speed">
                <i data-lucide="gauge"></i><span>속도</span>
              </button>
            </div>

            <!-- Conversion Inputs -->
            <div class="converter-body">
              <div class="converter-box">
                <label>입력 값</label>
                <input type="number" id="converter-input-val" class="converter-val" value="1">
                <select id="converter-input-unit" class="converter-unit"></select>
              </div>
              <div class="converter-arrow">
                <i data-lucide="chevrons-right" class="arrow-desktop"></i>
                <i data-lucide="chevrons-down" class="arrow-mobile"></i>
              </div>
              <div class="converter-box">
                <label>변환 값</label>
                <input type="number" id="converter-output-val" class="converter-val" readonly>
                <select id="converter-output-unit" class="converter-unit"></select>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- History Sidebar -->
      <aside class="history-sidebar" id="history-sidebar">
        <div class="history-header">
          <h3>계산 기록</h3>
          <button class="btn-clear-history" id="btn-clear-history" title="기록 지우기">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
        <div class="history-list" id="history-list">
          <!-- Dynamically populated -->
          <div class="empty-history">계산 기록이 없습니다.</div>
        </div>
      </aside>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    // Initialize lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
